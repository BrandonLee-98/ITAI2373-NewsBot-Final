<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsBot 2.0 | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section { background: #004a99; color: white; padding: 60px 0; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="hero-section text-center">
    <div class="container">
        <h1 class="display-4">🤖 NewsBot Intelligence 2.0</h1>
        <p class="lead">Advanced NLP Analysis for Houston City College</p>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Analyze New Content</h5>
                    <form action="/analyze" method="POST">
                        <div class="mb-3">
                            <label for="article_text" class="form-label">Paste News Article Below:</label>
                            <textarea class="form-control" id="article_text" name="article_text" rows="10" placeholder="Paste article text here..." required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Run Deep Intelligence Analysis</button>
                        </div>
                    </form>
                </div>
            </div>
            
            <p class="text-muted mt-4 text-center">Developed by Brandon Matias | ITAI 2373 Final Project</p>
        </div>
    </div>
</div>

</body>
</html>
