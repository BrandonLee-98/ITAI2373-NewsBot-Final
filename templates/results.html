<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results | NewsBot 2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #002d5a; } /* HCC-style Deep Blue */
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">🤖 NewsBot 2.0 | Analysis Dashboard</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-4 shadow-sm border-start border-info border-5">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="card-title mb-0">Mood & Tone</h5>
                </div>
                <div class="card-body">
                    <p class="lead">{{ sentiment_text }}</p>
                    <small class="text-muted">Calculated via SentimentAnalyzer module.</small>
                </div>
            </div>

            <div class="card shadow-sm border-start border-warning border-5">
                <div class="card-body text-center">
                    <h6>Quick Navigation</h6>
                    <hr>
                    <a href="/" class="btn btn-outline-primary w-100">Analyze New Article</a>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <h4 class="card-title border-bottom pb-2">Intelligent Summary</h4>
                    <p class="card-text fs-5 mt-3" style="line-height: 1.6;">
                        {{ summary }}
                    </p>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase small mb-2">Original Input Preview</h6>
                    <p class="text-muted small text-truncate">
                        {{ original_text }}
                    </p>
                </div>
            </div>
            
            <p class="text-center text-muted mt-5 small">
                Up-and-Coming Developer Portfolio | Houston City College 2026
            </p>
        </div>
    </div>
</div>

</body>
</html>
